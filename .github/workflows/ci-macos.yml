name: CI macOS

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CruiseControl (Debug, unsigned)
        run: |
          xcodebuild -project "CruiseControl.xcodeproj" \
            -scheme "CruiseControl" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
