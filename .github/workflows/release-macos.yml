name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make DMG script executable
        run: chmod +x Scripts/build_dmg.sh

      - name: Build versioned DMG
        id: build_dmg
        shell: bash
        run: |
          set -euo pipefail
          Scripts/build_dmg.sh
          DMG_PATH="$(ls -t dist/dmg/CruiseControl-*.dmg | head -n 1)"
          if [[ -z "${DMG_PATH}" || ! -f "${DMG_PATH}" ]]; then
            echo "DMG not found in dist/dmg" >&2
            exit 1
          fi
          echo "dmg_path=${DMG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "dmg_name=$(basename "${DMG_PATH}")" >> "${GITHUB_OUTPUT}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_dmg.outputs.dmg_name }}
          path: ${{ steps.build_dmg.outputs.dmg_path }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_dmg.outputs.dmg_path }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}
          name: CruiseControl ${{ github.ref_name }}
