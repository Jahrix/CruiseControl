name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      DEVELOPER_ID_APP_CERT: ${{ secrets.DEVELOPER_ID_APP_CERT }}
      NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Xcode and SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-release-${{ hashFiles('**/*.xcodeproj/**', '**/Package.resolved', '**/*.swift', 'Scripts/*.sh') }}
          restore-keys: |
            ${{ runner.os }}-release-
            ${{ runner.os }}-xcode-

      - name: Ensure release scripts are executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x Scripts/build_dmg.sh
          if [[ -f "Scripts/notarize_dmg.sh" ]]; then
            chmod +x Scripts/notarize_dmg.sh
          fi

      - name: Build versioned DMG
        id: build_dmg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-logs
          Scripts/build_dmg.sh 2>&1 | tee ci-logs/build_dmg.log
          DMG_PATH="$(ls -t dist/dmg/CruiseControl-*.dmg | head -n 1)"
          if [[ -z "${DMG_PATH}" || ! -f "${DMG_PATH}" ]]; then
            echo "DMG not found in dist/dmg/" >&2
            exit 1
          fi
          echo "dmg_path=${DMG_PATH}" >> "${GITHUB_OUTPUT}"
          echo "dmg_name=$(basename "${DMG_PATH}")" >> "${GITHUB_OUTPUT}"

      - name: Notarize DMG
        if: ${{ env.DEVELOPER_ID_APP_CERT != '' && (env.NOTARY_KEYCHAIN_PROFILE != '' || (env.APPLE_ID != '' && env.TEAM_ID != '' && env.APP_PASSWORD != '')) }}
        shell: bash
        env:
          DMG_PATH: ${{ steps.build_dmg.outputs.dmg_path }}
        run: |
          set -euo pipefail
          Scripts/notarize_dmg.sh 2>&1 | tee ci-logs/notarize_dmg.log

      - name: Skip notarization
        if: ${{ !(env.DEVELOPER_ID_APP_CERT != '' && (env.NOTARY_KEYCHAIN_PROFILE != '' || (env.APPLE_ID != '' && env.TEAM_ID != '' && env.APP_PASSWORD != ''))) }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Notarization secrets not configured. Skipping notarization."

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build_dmg.outputs.dmg_name }}
          path: ${{ steps.build_dmg.outputs.dmg_path }}
          if-no-files-found: error

      - name: Upload release logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-logs
          path: ci-logs
          if-no-files-found: ignore

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build_dmg.outputs.dmg_path }}
          generate_release_notes: true
